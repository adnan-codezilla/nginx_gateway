# =============================================================
#  hashimpact.io  +  api.hashimpact.io
# =============================================================

upstream hashimpact_frontend {
    server hashimpact_frontend:8081;
}

upstream hashimpact_backend {
    server hashimpact_backend:8080;
}

# ---------- hashimpact.io ----------
server {
  listen 80;
  server_name hashimpact.io;

  # Let's Encrypt ACME challenge (needed to issue / renew certs)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass         http://hashimpact_frontend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

# ---------- api.hashimpact.io ----------
server {
  listen 80;
  server_name api.hashimpact.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass         http://hashimpact_backend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}
