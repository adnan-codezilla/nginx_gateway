# =============================================================
#  hashimpact.io + api.hashimpact.io - HTTP only
#  Used before SSL exists and for Let's Encrypt ACME challenges.
# =============================================================

server {
  listen 80;
  server_name hashimpact.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $upstream hashimpact_frontend:8081;
    proxy_pass http://$upstream;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

server {
  listen 80;
  server_name api.hashimpact.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $upstream hashimpact_backend:8080;
    proxy_pass http://$upstream;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}
