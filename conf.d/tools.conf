# =============================================================
#  tools.hashtax.io  +  tools-api.hashtax.io
# =============================================================

# ---------- Redirect HTTP to HTTPS ----------
server {
  listen 80;
  server_name tools.hashtax.io tools-api.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---------- tools.hashtax.io ----------
server {
  listen 443 ssl;
  http2 on;
  server_name tools.hashtax.io;

  ssl_certificate     /etc/letsencrypt/live/tools.hashtax.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tools.hashtax.io/privkey.pem;

  include /etc/nginx/conf.d/ssl_params.conf;
  include /etc/nginx/conf.d/security_headers.conf;

  location / {
    set $upstream hashtax_frontend:3000;
    proxy_pass         http://$upstream;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

# ---------- tools-api.hashtax.io ----------
server {
  listen 443 ssl;
  http2 on;
  server_name tools-api.hashtax.io;

  ssl_certificate     /etc/letsencrypt/live/tools.hashtax.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tools.hashtax.io/privkey.pem;

  include /etc/nginx/conf.d/ssl_params.conf;
  include /etc/nginx/conf.d/security_headers.conf;

  location / {
    set $upstream hashtax_backend:5000;
    proxy_pass         http://$upstream;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}
