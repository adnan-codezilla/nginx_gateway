# =============================================================
#  tools.hashtax.io  +  tools-api.hashtax.io
#
#  Stage 1 (no cert yet):
#    - Serves ACME challenge so certbot can issue the cert.
#    - Forwards everything else over plain HTTP.
#
#  After running  issue_all_ssl.sh  this file is replaced with
#  conf.d/tools.ssl.conf.disabled
# =============================================================

# ---------- tools.hashtax.io ----------
server {
  listen 80;
  server_name tools.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $tools_frontend http://hashtax_frontend:3000;
    proxy_pass         $tools_frontend;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

# ---------- tools-api.hashtax.io ----------
server {
  listen 80;
  server_name tools-api.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

# ---------- logs.hashtax.io ----------
server {
  listen 80;
  server_name logs.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $dozzle http://dozzle:8888;
    proxy_pass         $dozzle;
    include /etc/nginx/conf.d/proxy_params.conf;
    
    # Disable buffering for live streaming logs
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    chunked_transfer_encoding on;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }
}
