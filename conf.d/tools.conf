server {
  listen 80;
  server_name tools.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name tools.hashtax.io;

  ssl_certificate     /etc/letsencrypt/live/tools.hashtax.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tools.hashtax.io/privkey.pem;

  location / {
    set $tools_frontend http://hashtax_frontend:3000;
    proxy_pass $tools_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name tools-api.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name tools-api.hashtax.io;

  ssl_certificate     /etc/letsencrypt/live/tools.hashtax.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tools.hashtax.io/privkey.pem;

  location / {
    set $tools_backend http://hashtax_backend:5000;
    proxy_pass $tools_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
