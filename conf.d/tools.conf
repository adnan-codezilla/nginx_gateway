# =============================================================
#  tools.hashtax.io  +  tools-api.hashtax.io
#
#  Stage 1 (no cert yet):
#    - Serves ACME challenge so certbot can issue the cert.
#    - Forwards everything else over plain HTTP.
#
#  After running  issue_all_ssl.sh  this file is replaced with
#  conf.d/tools.ssl.conf.disabled
# =============================================================

# ---------- tools.hashtax.io ----------
server {
  listen 80;
  server_name tools.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass         http://hashtax_frontend:3000;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

# ---------- tools-api.hashtax.io ----------
server {
  listen 80;
  server_name tools-api.hashtax.io;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass         http://hashtax_backend:5000;
    include /etc/nginx/conf.d/proxy_params.conf;
  }
}

