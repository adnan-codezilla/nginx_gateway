services:
  nginx_gateway:
    image: nginx:1.27-alpine
    container_name: nginx_gateway
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hashtax_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  certbot:
    image: certbot/certbot:v5.5.0
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - hashtax_network

networks:
  hashtax_network:
    external: true
