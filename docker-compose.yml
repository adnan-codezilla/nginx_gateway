services:
  nginx_gateway:
    image: nginx:latest
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    networks:
      - hashtax_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8888"
    networks:
      - hashtax_network
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_ADDR=:8888

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - hashtax_network

  ssl_issuer:
    image: alpine:latest
    container_name: ssl_issuer
    depends_on:
      - nginx_gateway
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache bash docker-cli && sleep 5 && bash issue_all_ssl.sh hello@hashtax.io"]
    networks:
      - hashtax_network

networks:
  hashtax_network:
    external: true
