services:
  nginx_gateway:
    image: nginx:latest
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    networks:
      - hashtax_network
    extra_hosts:
      - "hashtax_backend:192.168.96.5"
      - "hashimpact_backend:192.168.96.8"
      - "hashtax_frontend:192.168.96.6"
      - "hashimpact_frontend:192.168.96.7"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    networks:
      - hashtax_network

networks:
  hashtax_network:
    external: true
